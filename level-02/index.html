<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vibe Code Academy — Level 2</title>
  <meta name="description" content="Level 2 — Build ClearCRM with Next.js 14, Supabase, and Bolt.new. Ship a live production CRM in 20 days." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🟢</text></svg>" />

  <!-- Docsify Dark Theme -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/style.min.css" />

  <style>
    :root {
      --theme-color: #10B981;
      --sidebar-background: #0F172A;
    }

    /* Sidebar */
    .sidebar {
      background-color: #0F172A !important;
      border-right: 1px solid #1E293B;
    }

    .sidebar-nav a {
      color: #94A3B8 !important;
      font-size: 0.875rem;
      transition: color 0.15s ease;
    }

    .sidebar-nav a:hover,
    .sidebar-nav a.active {
      color: #10B981 !important;
    }

    .sidebar-nav strong {
      color: #F8FAFC !important;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      display: block;
      margin-top: 1.5rem;
      margin-bottom: 0.5rem;
      padding-left: 0.5rem;
    }

    /* App name in sidebar */
    .app-name-link {
      color: #10B981 !important;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: -0.02em;
    }

    /* Main content */
    .content {
      max-width: 860px;
    }

    /* Markdown body */
    .markdown-section {
      font-size: 1rem;
      line-height: 1.75;
      color: #E2E8F0;
    }

    .markdown-section h1 {
      font-size: 2rem;
      font-weight: 800;
      color: #F8FAFC;
      letter-spacing: -0.03em;
      margin-bottom: 0.5rem;
    }

    .markdown-section h2 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #F8FAFC;
      border-bottom: 1px solid #1E293B;
      padding-bottom: 0.4rem;
      margin-top: 2.5rem;
    }

    .markdown-section h3 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #CBD5E1;
      margin-top: 1.75rem;
    }

    .markdown-section code {
      background: #1E293B;
      color: #10B981;
      border-radius: 4px;
      padding: 0.15em 0.4em;
      font-size: 0.875em;
    }

    .markdown-section pre {
      background: #0F172A !important;
      border: 1px solid #1E293B;
      border-radius: 8px;
    }

    .markdown-section pre code {
      background: transparent;
      color: #E2E8F0;
    }

    .markdown-section blockquote {
      border-left: 4px solid #10B981;
      background: #0F172A;
      color: #94A3B8;
      border-radius: 0 6px 6px 0;
      padding: 0.75rem 1rem;
    }

    .markdown-section table {
      border-collapse: collapse;
      width: 100%;
      font-size: 0.9rem;
    }

    .markdown-section table th {
      background: #1E293B;
      color: #F8FAFC;
      font-weight: 600;
      text-align: left;
      padding: 0.6rem 1rem;
    }

    .markdown-section table td {
      border-bottom: 1px solid #1E293B;
      padding: 0.6rem 1rem;
      color: #CBD5E1;
    }

    .markdown-section table tr:hover td {
      background: #1E293B22;
    }

    /* Checkbox list items */
    .markdown-section input[type="checkbox"] {
      accent-color: #10B981;
      margin-right: 0.5rem;
    }

    /* Search */
    .search input {
      background: #1E293B !important;
      border: 1px solid #334155 !important;
      color: #E2E8F0 !important;
      border-radius: 6px;
    }

    .search input::placeholder {
      color: #64748B !important;
    }

    /* Pagination */
    .pagination-item a {
      color: #10B981 !important;
      border: 1px solid #10B981 !important;
      border-radius: 6px;
      padding: 0.4rem 0.9rem;
      transition: background 0.15s ease;
    }

    .pagination-item a:hover {
      background: #10B981 !important;
      color: #0F172A !important;
    }

    /* Cover page */
    section.cover {
      background: linear-gradient(135deg, #0F172A 0%, #064E3B 100%) !important;
    }

    section.cover h1 {
      color: #10B981 !important;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    window.$docsify = {
      name: 'Vibe Code Academy — Level 2',
      repo: 'Naseem1981/vibe-code-academy',
      loadSidebar: '_sidebar.md',
      homepage: 'introduction.md',
      themeColor: '#10B981',
      auto2top: true,
      maxLevel: 3,
      subMaxLevel: 2,

      search: {
        placeholder: 'Search Level 2...',
        noData: 'No results found.',
        depth: 3,
      },

      pagination: {
        previousText: '← Previous Day',
        nextText: 'Next Day →',
        crossChapter: true,
        crossChapterText: true,
      },

      copyCode: {
        buttonText: 'Copy',
        errorText: 'Error',
        successText: 'Copied!',
      },

      plugins: [],
    };
  </script>

  <!-- Docsify core -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>

  <!-- Dark theme plugin -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/index.min.js"></script>

  <!-- Search plugin -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>

  <!-- Copy code plugin -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>

  <!-- Pagination plugin -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
</body>
</html>
